<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="shell">
  <h2>Welcome</h2>

  <h3 id="userName"></h3>

  <p><b>Date:</b> <span id="date"></span></p>

  <h4>Purchased Items:</h4>
  <ul>
    <li>Shirt - Size M - $20</li>
    <li>Shoes - Size 9 - $50</li>
  </ul>
  <ul id="itemList"></ul>
<p><b>Total Cost:</b> <span id="total"></span></p>

  <p><b>Total Cost:</b> $70</p>

  <button onclick="logout()">Logout</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("currentUser"));

document.getElementById("userName").innerText = "Hello " + user.name;

let total = 0;
let list = document.getElementById("itemList");

// Show items
user.items.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.product + " - Size " + item.size + " - $" + item.price;
    list.appendChild(li);

    total += item.price;
});

// Show total
document.getElementById("total").innerText = "$" + total;
</script>

</body>
</html>
